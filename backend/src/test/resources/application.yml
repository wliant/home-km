# Test configuration — overrides main application.yml for test contexts
# These values are test-only; never use in production
app:
  jwt:
    secret: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
    expiry-hours: 1
  bcrypt:
    cost: 4
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: homekm-test
  vapid:
    public-key: ''
    private-key: ''
    subject: mailto:test@example.com

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/homekm_test}
    username: ${SPRING_DATASOURCE_USERNAME:homekm}
    password: ${SPRING_DATASOURCE_PASSWORD:homekm}
