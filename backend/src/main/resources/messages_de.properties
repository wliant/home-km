VALIDATION_ERROR = Ein oder mehrere Felder sind ung\u00fcltig.
NOT_FOUND = Die angeforderte Ressource wurde nicht gefunden.
FORBIDDEN = Zugriff verweigert.
CHILD_ACCOUNT_READ_ONLY = Kinderkonten sind schreibgesch\u00fctzt.
RATE_LIMITED = Zu viele Anfragen. Bitte warte einen Moment.
INTERNAL_ERROR = Ein unerwarteter Fehler ist aufgetreten.
DUPLICATE_NAME = Ein Element mit diesem Namen existiert bereits.
EMAIL_ALREADY_EXISTS = Diese E-Mail-Adresse ist bereits registriert.
INVALID_CREDENTIALS = Ung\u00fcltige E-Mail oder Passwort.
INVALID_PASSWORD = Falsches Passwort.
ACCOUNT_DISABLED = Dieses Konto wurde deaktiviert.
LAST_ADMIN = Du bist der einzige Administrator. Bef\u00f6rdere einen anderen Nutzer vor dem Deaktivieren.
TOKEN_EXPIRED = Deine Sitzung ist abgelaufen. Bitte melde dich erneut an.
STORAGE_UNAVAILABLE = Die Dateispeicherung ist vor\u00fcbergehend nicht verf\u00fcgbar. Bitte versuche es sp\u00e4ter erneut.
SESSION_NOT_FOUND = Sitzung nicht gefunden.
USER_NOT_FOUND = Benutzer nicht gefunden.
SAME_TAG = Ein Tag kann nicht mit sich selbst zusammengef\u00fchrt werden.
MAX_TAGS_EXCEEDED = Maximal 20 Tags pro Element.
FOLDER_NAME_EXISTS = Ein Ordner mit diesem Namen existiert bereits auf dieser Ebene.
FOLDER_HAS_CHILDREN = Dieser Ordner enth\u00e4lt noch Unterordner. L\u00f6sche mit force=true zum Kaskadieren.
FOLDER_DELETED = Dieser Ordner ist gel\u00f6scht; stelle ihn wieder her, bevor du dearchivierst.
CYCLE_DETECTED = Dieses Verschieben w\u00fcrde einen Ordner-Zyklus erzeugen.
MAX_FOLDER_DEPTH_EXCEEDED = Ordner d\u00fcrfen nicht tiefer als 20 Ebenen sein.
NOT_DELETED = Element ist nicht im Papierkorb.
