# Default (English) message catalogue. Keys are the stable error codes
# returned in ErrorResponse.code; the matching values are user-facing
# strings localised per request via Accept-Language. Missing keys fall back
# to the code itself, so adding a new code is safe before its translation
# lands.
VALIDATION_ERROR = One or more fields failed validation.
NOT_FOUND = The requested resource was not found.
FORBIDDEN = Access denied.
CHILD_ACCOUNT_READ_ONLY = Child accounts are read-only.
RATE_LIMITED = Too many requests. Please slow down.
INTERNAL_ERROR = An unexpected error occurred.
DUPLICATE_NAME = An item with that name already exists.
EMAIL_ALREADY_EXISTS = That email is already registered.
INVALID_CREDENTIALS = Invalid email or password.
INVALID_PASSWORD = Wrong password.
ACCOUNT_DISABLED = This account has been disabled.
LAST_ADMIN = You are the only admin — promote another user before deactivating.
TOKEN_EXPIRED = Your session has expired. Please sign in again.
STORAGE_UNAVAILABLE = File storage is temporarily unavailable. Try again shortly.
SESSION_NOT_FOUND = Session not found.
USER_NOT_FOUND = User not found.
SAME_TAG = Cannot merge a tag with itself.
MAX_TAGS_EXCEEDED = Maximum 20 tags per item.
FOLDER_NAME_EXISTS = A folder with that name already exists at this level.
FOLDER_HAS_CHILDREN = This folder still has subfolders. Delete with force=true to cascade.
FOLDER_DELETED = This folder is deleted; restore it before unarchiving.
CYCLE_DETECTED = This move would create a folder cycle.
MAX_FOLDER_DEPTH_EXCEEDED = Folders cannot be more than 20 levels deep.
NOT_DELETED = Item is not in the trash.
