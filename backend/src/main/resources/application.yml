spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      # Sizing rule of thumb: pool_size = ((core_count * 2) + effective_spindle_count).
      # 10 fits a 4-core host with SSD; tune via DB_POOL_SIZE for larger hosts.
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 30000
      # Surface connection leaks: any connection held > 30s logs a stack trace
      # tagged with the leak source. Adjust if long-running queries are legitimate.
      leak-detection-threshold: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        generate_statistics: ${HIBERNATE_STATS:false}
        # Hibernate emits a WARN on org.hibernate.SQL_SLOW for any query that
        # takes longer than this threshold. Tune via SQL_SLOW_THRESHOLD_MS;
        # 0 disables. The Loki dashboard already filters on this logger so
        # turning it on here is enough to populate the slow-query panel.
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: ${SQL_SLOW_THRESHOLD_MS:500}
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_UPLOAD_MB:-100}MB
      max-request-size: ${MAX_FILE_UPLOAD_MB:-100}MB
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: ${SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${SMTP_STARTTLS:false}
  jackson:
    serialization:
      write-dates-as-timestamps: false
      write-dates-with-context-time-zone: true
    time-zone: UTC
  cache:
    type: caffeine
    cache-names: tags, folderTree, userById
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=5m
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8080
  shutdown: graceful
  compression:
    # Gzip JSON list responses and OpenAPI docs. nginx in front already
    # gzips static assets; this catches direct API hits (CLI, mobile clients,
    # health checks bypassing the frontend nginx).
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,application/vnd.spring-boot.actuator.v3+json
    min-response-size: 1KB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  info:
    git:
      mode: full
    build:
      enabled: true
    env:
      enabled: false  # exposing env keys here would leak SMTP/JWT names
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        readiness:
          include: db, minio, ping
        liveness:
          include: livenessState
  tracing:
    # 0 = no spans recorded (zero overhead). Set to e.g. 0.1 in prod via
    # MGMT_TRACING_SAMPLING when an OTLP collector is wired up. Spring Boot's
    # observation system already produces metrics; tracing is purely the
    # export-to-Tempo path.
    sampling:
      probability: ${MGMT_TRACING_SAMPLING:0.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:}

resilience4j:
  retry:
    instances:
      minio:
        max-attempts: 3
        wait-duration: 50ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 4
        retry-exceptions:
          - java.io.IOException
          - io.minio.errors.ServerException
          - io.minio.errors.InternalException
  circuitbreaker:
    instances:
      minio:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  bulkhead:
    instances:
      minio:
        max-concurrent-calls: 25
        max-wait-duration: 100ms

springdoc:
  api-docs:
    path: /api/openapi
  swagger-ui:
    path: /api/docs
    operations-sorter: alpha

app:
  jwt:
    secret: ${JWT_SECRET}
    expiry-hours: ${JWT_EXPIRY_HOURS:24}
    access-expiry-minutes: ${JWT_ACCESS_EXPIRY_MINUTES:15}
    refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:30}
    refresh-expiry-hours-default: ${JWT_REFRESH_EXPIRY_HOURS_DEFAULT:8}
  bcrypt:
    cost: ${BCRYPT_COST:12}
  minio:
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket-name: ${MINIO_BUCKET_NAME:homekm}
  vapid:
    public-key: ${VAPID_PUBLIC_KEY:}
    private-key: ${VAPID_PRIVATE_KEY:}
    subject: ${VAPID_SUBJECT:}
  presigned-url-expiry-minutes: ${PRESIGNED_URL_EXPIRY_MINUTES:15}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    from: ${APP_MAIL_FROM:noreply@homekm.local}
  name: ${APP_NAME:Home KM}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    rules:
      - id: login
        path-pattern: /api/auth/login
        method: POST
        scope: ip
        limit: 20
        window-seconds: 60
      - id: register
        path-pattern: /api/auth/register
        method: POST
        scope: ip
        limit: 5
        window-seconds: 3600
      - id: password-reset
        path-pattern: /api/auth/password-reset/request
        method: POST
        scope: ip
        limit: 3
        window-seconds: 3600
      - id: writes
        path-pattern: /api/**
        method: ANY_WRITE
        scope: user
        limit: 60
        window-seconds: 60
      # Comment spam — even a single user shouldn't flood threads.
      - id: comments
        path-pattern: /api/comments/**
        method: POST
        scope: user
        limit: 30
        window-seconds: 60
      # Anonymous share-link redemption: per-IP cap on the resolver, since the
      # caller hasn't authenticated yet (no user-scoped budget available).
      - id: share-resolve
        path-pattern: /api/share/**
        method: POST
        scope: ip
        limit: 60
        window-seconds: 60
      # File uploads — chunked uploaders can chew through the global writes
      # budget; cap per-user separately so other writes still go through.
      - id: file-uploads
        path-pattern: /api/files
        method: POST
        scope: user
        limit: 30
        window-seconds: 60
  idempotency:
    enabled: ${IDEMPOTENCY_ENABLED:true}
    ttl-hours: 24
  files:
    allowed-mime:
      - image/png
      - image/jpeg
      - image/gif
      - image/webp
      - image/avif
      - image/svg+xml
      - application/pdf
      - text/plain
      - text/markdown
      - text/csv
      - application/json
      - application/zip
      - application/x-tar
      - application/gzip
      - audio/mpeg
      - audio/ogg
      - audio/wav
      - video/mp4
      - video/webm
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.ms-excel
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
    require-scan: ${FILES_REQUIRE_SCAN:false}
    av-host: ${CLAMD_HOST:}
    av-port: ${CLAMD_PORT:3310}
  invitations:
    allow-open-registration: ${ALLOW_OPEN_REGISTRATION:false}
    expiry-hours: ${INVITATION_EXPIRY_HOURS:168}
  embedding:
    enabled: ${EMBEDDING_ENABLED:false}
    ollama-url: ${OLLAMA_URL:}
    model: ${EMBEDDING_MODEL:nomic-embed-text}
    dim: ${EMBEDDING_DIM:768}
