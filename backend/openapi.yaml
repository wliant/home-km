          type: string
        createdAt:
          type: string
          format: date-time
    ReminderRequest:
      required:
      - remindAt
      type: object
      properties:
        remindAt:
          type: string
          format: date-time
        recurrence:
          pattern: daily|weekly|monthly|yearly
          type: string
        recipientUserIds:
          type: array
          items:
            type: integer
            format: int64
    ReminderResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        remindAt:
          type: string
          format: date-time
        recurrence:
          type: string
        pushSent:
          type: boolean
        recipientUserIds:
          type: array
          items:
            type: integer
            format: int64
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ChecklistItemRequest:
      required:
      - text
      type: object
      properties:
        text:
          type: string
        isChecked:
          type: boolean
        sortOrder:
          type: integer
          format: int32
    ChecklistItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        text:
          type: string
        isChecked:
          type: boolean
        sortOrder:
          type: integer
          format: int32
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ReorderItem:
      required:
      - id
      - sortOrder
