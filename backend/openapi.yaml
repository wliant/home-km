      properties:
        title:
          maxLength: 500
          minLength: 0
          type: string
        body:
          maxLength: 100000
          minLength: 0
          type: string
        label:
          pattern: recipe|todo|reminder|shopping_list|home_items|usage_manual|goal|aspiration|wish_list|travel_log|custom
