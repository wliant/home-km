        folderId:
          type: integer
          format: int64
        isChildSafe:
          type: boolean
    NoteDetail:
      type: object
      properties:
        id:
          type: integer
          format: int64
        folderId:
          type: integer
          format: int64
        ownerId:
          type: integer
          format: int64
        title:
          type: string
        body:
          type: string
        label:
          type: string
        isChildSafe:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        pinnedAt:
          type: string
          format: date-time
        checklistItems:
          type: array
          items:
            $ref: '#/components/schemas/ChecklistItemResponse'
        reminders:
          type: array
          items:
            $ref: '#/components/schemas/ReminderResponse'
