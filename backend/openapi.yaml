      properties:
        id:
          type: integer
          format: int64
        sortOrder:
          type: integer
          format: int32
    ReorderRequest:
      required:
      - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReorderItem'
    NoteRequest:
      required:
