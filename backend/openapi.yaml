      properties:
        name:
          maxLength: 100
          minLength: 0
          type: string
        color:
          pattern: "^#[0-9A-Fa-f]{6}$"
          type: string
    TagResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
