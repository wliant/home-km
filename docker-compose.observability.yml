# Optional observability stack: Prometheus + Grafana + Loki + Promtail + Tempo (OTel).
# Bring up with:
#   docker compose -f docker-compose.observability.yml up -d
# Then in docker-compose.app.yml set OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
# and Grafana will be available at http://localhost:3001 (admin/admin).
#
# This file is intentionally NOT included in the default deploy. Operators opt in.

version: '3.9'

networks:
  infra-net:
    name: homekm-infra-net
    external: true

volumes:
  promdata:
  lokidata:
  grafanadata:
  tempodata:

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=14d
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"
    networks: [infra-net]
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.1
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - lokidata:/loki
    ports:
      - "3100:3100"
    networks: [infra-net]
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.1
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infra/observability/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [infra-net]
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.5.0
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ./infra/observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempodata:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    networks: [infra-net]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3001:3000"
    networks: [infra-net]
    depends_on: [prometheus, loki, tempo]
    restart: unless-stopped
