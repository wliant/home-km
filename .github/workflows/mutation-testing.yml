name: Mutation testing (Pitest)

on:
  schedule:
    # 06:00 UTC every Monday — early enough to land before the team is online.
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  pitest:
    name: Pitest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.6'

      - name: Run Pitest
        run: gradle pitest --no-daemon

      - name: Upload Pitest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pitest-report
          path: backend/build/reports/pitest/
          retention-days: 30
