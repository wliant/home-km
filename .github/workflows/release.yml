name: release-please

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          package-name: home-km

  build-images:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      # Required for cosign keyless signing — the runner gets a short-lived
      # OIDC token that Sigstore's Fulcio exchanges for a signing certificate.
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'
      - name: Generate backend dependency SBOM
        working-directory: backend
        run: gradle cyclonedxBom --no-daemon
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Install syft (for image SBOMs)
        uses: anchore/sbom-action/download-syft@v0
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: tags
        run: echo "version=${{ needs.release-please.outputs.tag_name }}" >> "$GITHUB_OUTPUT"

      - name: Build & push API
        id: api
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ steps.tags.outputs.version }}
            ghcr.io/${{ github.repository }}/api:latest

      - name: Build & push Frontend
        id: frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ steps.tags.outputs.version }}
            ghcr.io/${{ github.repository }}/frontend:latest

      - name: Sign images with cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes ghcr.io/${{ github.repository }}/api@${{ steps.api.outputs.digest }}
          cosign sign --yes ghcr.io/${{ github.repository }}/frontend@${{ steps.frontend.outputs.digest }}

      - name: Generate image SBOMs (CycloneDX)
        run: |
          syft ghcr.io/${{ github.repository }}/api@${{ steps.api.outputs.digest }} \
            -o cyclonedx-json=sbom-api-image.json
          syft ghcr.io/${{ github.repository }}/frontend@${{ steps.frontend.outputs.digest }} \
            -o cyclonedx-json=sbom-frontend-image.json

      - name: Attest SBOMs to images
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign attest --yes --predicate sbom-api-image.json --type cyclonedx \
            ghcr.io/${{ github.repository }}/api@${{ steps.api.outputs.digest }}
          cosign attest --yes --predicate sbom-frontend-image.json --type cyclonedx \
            ghcr.io/${{ github.repository }}/frontend@${{ steps.frontend.outputs.digest }}

      - name: Attach SBOMs to the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tags.outputs.version }}" \
            sbom-api-image.json sbom-frontend-image.json \
            backend/build/reports/sbom-backend.json \
            --clobber
