name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Run unit tests
        run: gradle test --tests "com.homekm.auth.*" --tests "com.homekm.common.*" --tests "com.homekm.reminder.*"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-unit-coverage
          path: backend/build/reports/jacoco/test/html/
          retention-days: 7

  backend-integration:
    name: Backend integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Run integration tests
        run: gradle test --tests "com.homekm.integration.*"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-integration-coverage
          path: backend/build/reports/jacoco/test/html/
          retention-days: 7

  frontend:
    name: Frontend type-check, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    name: E2E tests (Playwright)
    needs: [backend-unit, backend-integration, frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for E2E
        run: |
          cat > .env <<'EOF'
          DB_USER=homekm
          DB_PASSWORD=homekm_e2e
          MINIO_ACCESS_KEY=minioadmin
          MINIO_SECRET_KEY=minioadmin
          JWT_SECRET=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          JWT_EXPIRY_HOURS=24
          BCRYPT_COST=4
          VAPID_PUBLIC_KEY=
          VAPID_PRIVATE_KEY=
          VAPID_SUBJECT=mailto:ci@example.com
          CORS_ALLOWED_ORIGINS=http://localhost:3000
          APP_NAME=Home KM
          APP_THEME_COLOR=#6366f1
          EOF

      - name: Start infrastructure
        run: docker compose -f docker-compose.infra.yml up -d

      - name: Wait for postgres
        run: |
          for i in $(seq 1 20); do
            docker compose -f docker-compose.infra.yml exec -T postgres \
              pg_isready -U homekm && break
            sleep 3
          done

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Start backend
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/homekm
          SPRING_DATASOURCE_USERNAME: homekm
          SPRING_DATASOURCE_PASSWORD: homekm_e2e
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET_NAME: homekm
          JWT_SECRET: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          JWT_EXPIRY_HOURS: '24'
          BCRYPT_COST: '4'
          VAPID_PUBLIC_KEY: ''
          VAPID_PRIVATE_KEY: ''
          VAPID_SUBJECT: 'mailto:ci@example.com'
          PRESIGNED_URL_EXPIRY_MINUTES: '15'
          MAX_FILE_UPLOAD_MB: '10'
          CORS_ALLOWED_ORIGINS: 'http://localhost:5173'
          SPRING_PROFILES_ACTIVE: test
        run: |
          gradle bootRun &
          echo $! > /tmp/api.pid

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_APP_NAME: Home KM
          VITE_APP_THEME_COLOR: '#6366f1'

      - name: Start frontend preview
        working-directory: frontend
        run: |
          npm run preview -- --port 5173 &
          echo $! > /tmp/frontend.pid

      - name: Wait for backend health
        run: |
          for i in $(seq 1 40); do
            curl -sf http://localhost:8080/actuator/health && break
            sleep 3
          done

      - name: Install Playwright browsers
        working-directory: e2e
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        env:
          BASE_URL: http://localhost:5173
          API_URL: http://localhost:8080
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Stop background processes
        if: always()
        run: |
          [ -f /tmp/api.pid ] && kill $(cat /tmp/api.pid) || true
          [ -f /tmp/frontend.pid ] && kill $(cat /tmp/frontend.pid) || true

  docker-build:
    name: Build Docker images
    needs: [backend-unit, backend-integration, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          build-args: GRADLE_VERSION=8.6
          push: false
          load: true
          tags: homekm-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: homekm-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan — backend image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: homekm-api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload backend Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api

      - name: Trivy scan — frontend image
        if: always()
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: homekm-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload frontend Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

  dependency-scan:
    name: Dependency scanning (OWASP DC + npm audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Cache OWASP DC database
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: dependency-check-${{ runner.os }}

      - name: Run OWASP Dependency-Check (backend)
        working-directory: backend
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: gradle dependencyCheckAnalyze --no-daemon

      - name: Upload OWASP DC SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend/build/reports/dependency-check-report.sarif
          category: owasp-dc

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high
