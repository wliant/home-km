version: '3.9'

networks:
  infra-net:
    name: homekm-infra-net
    external: true

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME:-homekm}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-homekm}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      BCRYPT_COST: ${BCRYPT_COST:-12}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      PRESIGNED_URL_EXPIRY_MINUTES: ${PRESIGNED_URL_EXPIRY_MINUTES:-15}
      MAX_FILE_UPLOAD_MB: ${MAX_FILE_UPLOAD_MB:-100}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      APP_NAME: ${APP_NAME:-Home KM}
      ALLOW_OPEN_REGISTRATION: ${ALLOW_OPEN_REGISTRATION:-false}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      IDEMPOTENCY_ENABLED: ${IDEMPOTENCY_ENABLED:-true}
      EMBEDDING_ENABLED: ${EMBEDDING_ENABLED:-false}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-768}
      FILES_REQUIRE_SCAN: ${FILES_REQUIRE_SCAN:-false}
      CLAMD_HOST: ${CLAMD_HOST:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-homekm-api}
      MGMT_TRACING_SAMPLING: ${MGMT_TRACING_SAMPLING:-0.0}
      SQL_SLOW_THRESHOLD_MS: ${SQL_SLOW_THRESHOLD_MS:-500}
    ports:
      - "${API_PORT:-8080}:8080"
    networks:
      - infra-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/actuator/health/readiness | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 5
    stop_grace_period: 35s
    restart: unless-stopped
    # Cap container log growth — without this the json-file driver retains
    # logs forever and a chatty week can fill /var/lib/docker. Five 50MB
    # files (~250MB) suits a household-scale backend; bump for chatty
    # debug logging or migrate to docs/observability.md once Loki is up.
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Optional Ollama sidecar for semantic search. Only starts when the
  # `semantic` profile is selected, so households that don't want the CPU
  # cost (~1 core busy during backfill) keep `docker compose up` lean.
  #
  #   docker compose --profile semantic -f docker-compose.app.yml up -d
  #
  # Then set EMBEDDING_ENABLED=true in .env (default OLLAMA_URL points at
  # this service) and pull the model into the running container:
  #   docker exec -it homekm-ollama ollama pull nomic-embed-text
  ollama:
    image: ollama/ollama:0.3.12
    container_name: homekm-ollama
    profiles: ["semantic"]
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - infra-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_APP_NAME: ${APP_NAME:-Home KM}
        VITE_APP_THEME_COLOR: ${APP_THEME_COLOR:-#6366f1}
        MAX_FILE_UPLOAD_MB: ${MAX_FILE_UPLOAD_MB:-100}
    environment:
      MINIO_PUBLIC_ORIGIN: ${MINIO_PUBLIC_ORIGIN:-}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - infra-net
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  ollama-data:
